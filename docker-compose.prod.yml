# Production Docker Compose deployment for the Raspberry Pi.
# The GitHub Actions workflow writes .env.production on the Pi from repository
# secrets and variables before running this file.

x-app: &app
  image: migraine-forecast:production
  build:
    context: .
    dockerfile: Dockerfile
  env_file:
    - .env.production
  restart: unless-stopped
  stop_grace_period: 30s

services:
  web:
    <<: *app
    command: gunicorn migraine_project.wsgi:application -c gunicorn.conf.py
    ports:
      - "8889:8889"

  worker-default:
    <<: *app
    command: >
      python -u -m celery -A migraine_project worker
      --loglevel=info
      --queues=default
      --concurrency=2
      --max-tasks-per-child=100
    depends_on:
      - web

  worker-llm:
    <<: *app
    command: >
      python -u -m celery -A migraine_project worker
      --loglevel=info
      --queues=llm
      --concurrency=1
      --max-tasks-per-child=50
    stop_grace_period: 60s
    depends_on:
      - web

  celery-beat:
    <<: *app
    command: python -u -m celery -A migraine_project beat --loglevel=info
    depends_on:
      - web
